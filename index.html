<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pustaka — Toko Buku Daring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5EFE3;
    --paper:#FBF7EE;
    --ink:#2A2118;
    --ink-soft:#5C4F40;
    --primary:#2F4A3C;
    --primary-dark:#1E332A;
    --accent:#C0563B;
    --accent-soft:#E9C9BC;
    --gold:#BD9230;
    --line:#DCD0BA;
    --line-soft:#EAE1CE;
    --danger:#A23B30;
    --ok:#3E6B4F;
    --shadow: 0 6px 18px rgba(42,33,24,0.10);
    --radius:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Source Serif 4', serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(42,33,24,0.015) 0px, rgba(42,33,24,0.015) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
    z-index:0;
  }
  h1,h2,h3,h4{font-family:'Fraunces', serif; font-weight:700; color:var(--ink); margin:0;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  #app{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column;}

  /* ===== HEADER ===== */
  header.topbar{
    background:var(--primary);
    color:var(--paper);
    border-bottom:3px solid var(--primary-dark);
  }
  .topbar-inner{
    max-width:1180px; margin:0 auto; padding:14px 24px;
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:baseline; gap:10px; cursor:pointer;}
  .brand .mark{
    font-family:'Fraunces', serif; font-weight:900; font-size:26px; letter-spacing:1px;
    color:var(--paper);
  }
  .brand .tag{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:3px;
    text-transform:uppercase; color:var(--accent-soft); border-left:1px solid rgba(255,255,255,0.25);
    padding-left:10px;
  }
  .search-box{
    flex:1; min-width:180px; max-width:440px;
    display:flex; align-items:center; background:var(--paper);
    border-radius:3px; overflow:hidden; border:1px solid var(--primary-dark);
  }
  .search-box input{
    flex:1; border:none; outline:none; padding:9px 12px; font-family:'Source Serif 4', serif;
    font-size:14px; background:transparent; color:var(--ink);
  }
  .search-box .icon{padding:0 12px; color:var(--ink-soft); font-size:14px;}
  nav.main-nav{display:flex; align-items:center; gap:6px; margin-left:auto; flex-wrap:wrap;}
  nav.main-nav button{
    background:transparent; border:1px solid transparent; color:var(--paper);
    font-size:13px; letter-spacing:0.5px; padding:8px 12px; border-radius:3px;
    font-family:'IBM Plex Mono', monospace; transition:all .15s;
    display:flex; align-items:center; gap:6px;
  }
  nav.main-nav button:hover{border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.06);}
  nav.main-nav button.primary-btn{background:var(--accent); border-color:var(--accent);}
  nav.main-nav button.primary-btn:hover{background:#a8492f;}
  .cart-badge{
    background:var(--accent); color:#fff; font-size:11px; border-radius:50%;
    min-width:18px; height:18px; display:flex; align-items:center; justify-content:center;
    padding:0 4px; font-family:'IBM Plex Mono', monospace;
  }

  /* ===== MAIN LAYOUT ===== */
  main{max-width:1180px; margin:0 auto; padding:28px 24px 60px; width:100%; flex:1;}

  /* ===== HERO ===== */
  .hero{
    display:grid; grid-template-columns:1.3fr 1fr; gap:28px; align-items:center;
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    padding:36px; margin-bottom:30px; box-shadow:var(--shadow);
  }
  .hero h1{font-size:42px; line-height:1.1; font-style:italic;}
  .hero p{color:var(--ink-soft); font-size:16px; max-width:480px; margin-top:12px;}
  .hero-stats{display:flex; gap:24px; margin-top:22px;}
  .hero-stat{}
  .hero-stat .num{font-family:'IBM Plex Mono', monospace; font-size:26px; font-weight:600; color:var(--accent);}
  .hero-stat .lbl{font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft);}
  .ledger{
    border:1px solid var(--line); border-radius:var(--radius); background:var(--bg);
    padding:18px 20px; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft);
    position:relative;
  }
  .ledger::before{
    content:"KARTU KATALOG"; position:absolute; top:-9px; left:16px; background:var(--paper);
    padding:0 8px; font-size:10px; letter-spacing:3px; color:var(--gold); font-weight:600;
  }
  .ledger-row{display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line);}
  .ledger-row:last-child{border-bottom:none;}

  /* ===== FILTER BAR ===== */
  .filter-bar{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:22px;
    padding-bottom:14px; border-bottom:1px solid var(--line);
  }
  .filter-bar .tab{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:1px;
    padding:7px 14px; border:1px solid var(--line); border-radius:20px; background:var(--paper);
    color:var(--ink-soft);
  }
  .filter-bar .tab.active{background:var(--primary); color:var(--paper); border-color:var(--primary);}
  .filter-bar select{
    font-family:'IBM Plex Mono', monospace; font-size:12px; padding:7px 10px; border-radius:20px;
    border:1px solid var(--line); background:var(--paper); color:var(--ink-soft); margin-left:auto;
  }

  /* ===== BOOK GRID / CARDS ===== */
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:20px;}
  .book-card{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--shadow);
    transition:transform .15s, box-shadow .15s; position:relative;
  }
  .book-card:hover{transform:translateY(-3px); box-shadow:0 10px 24px rgba(42,33,24,0.14);}
  .book-card .spine{
    height:180px; display:flex; align-items:center; justify-content:center; position:relative;
    color:#fff; font-family:'Fraunces', serif; font-weight:700; font-size:13px; text-align:center;
    padding:0; overflow:hidden; background:var(--line-soft);
  }
  .book-card .spine img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .book-card .spine::after{
    content:""; position:absolute; left:0; top:0; bottom:0; width:8px; background:rgba(0,0,0,0.18); z-index:2;
  }
  .book-card .cat-pill{
    position:absolute; top:8px; right:10px; font-family:'IBM Plex Mono', monospace; font-size:9px;
    letter-spacing:1.5px; background:rgba(0,0,0,0.25); color:#fff; padding:3px 7px; border-radius:10px;
  }
  .book-card .info{padding:12px 14px 14px; display:flex; flex-direction:column; gap:6px; flex:1;}
  .book-card .title{font-size:15px; line-height:1.25; cursor:pointer;}
  .book-card .author{font-size:12px; color:var(--ink-soft); font-style:italic;}
  .book-card .rating{font-size:11px; color:var(--gold); font-family:'IBM Plex Mono', monospace;}
  .book-card .stock-line{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace;}
  .book-card .price-row{display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px;}
  .book-card .price{font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:14px;}
  .stamp{
    font-family:'IBM Plex Mono', monospace; font-size:9px; letter-spacing:2px; font-weight:700;
    border:2px solid; border-radius:3px; padding:3px 6px; transform:rotate(-6deg); text-transform:uppercase;
  }
  .stamp.ok{color:var(--ok); border-color:var(--ok);}
  .stamp.low{color:var(--gold); border-color:var(--gold);}
  .stamp.out{color:var(--danger); border-color:var(--danger);}
  .add-btn{
    width:100%; margin-top:10px; padding:9px; border:1px solid var(--primary); background:var(--primary);
    color:var(--paper); border-radius:4px; font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:1px;
  }
  .add-btn:disabled{background:var(--line-soft); border-color:var(--line); color:var(--ink-soft); cursor:not-allowed;}
  .add-btn:hover:not(:disabled){background:var(--primary-dark);}

  /* ===== BUTTONS GENERAL ===== */
  .btn{
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:1px; padding:9px 16px;
    border-radius:4px; border:1px solid var(--primary); background:var(--primary); color:var(--paper);
  }
  .btn:hover{background:var(--primary-dark);}
  .btn.secondary{background:transparent; color:var(--primary); border-color:var(--primary);}
  .btn.secondary:hover{background:var(--line-soft);}
  .btn.danger{background:transparent; color:var(--danger); border-color:var(--danger);}
  .btn.danger:hover{background:#f5e6e3;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  /* ===== DETAIL VIEW ===== */
  .back-link{
    font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); background:none;
    border:none; padding:0 0 16px; display:inline-flex; align-items:center; gap:6px;
  }
  .back-link:hover{color:var(--accent);}
  .detail-wrap{display:grid; grid-template-columns:300px 1fr; gap:30px;}
  .detail-cover{
    height:380px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Fraunces', serif; font-weight:800; font-size:24px; text-align:center; padding:0;
    box-shadow:var(--shadow); position:relative; overflow:hidden; background:var(--line-soft);
  }
  .detail-cover img{width:100%; height:100%; object-fit:cover; display:block;}
  .detail-cover::after{content:""; position:absolute; left:0; top:0; bottom:0; width:14px; background:rgba(0,0,0,0.2); z-index:2;}
  .detail-info .cat-tag{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--accent); border:1px solid var(--accent); border-radius:12px; padding:3px 10px; display:inline-block;
  }
  .detail-info h1{font-size:32px; margin:12px 0 4px;}
  .detail-info .author{font-style:italic; color:var(--ink-soft); margin-bottom:14px;}
  .detail-info .price-big{font-family:'IBM Plex Mono', monospace; font-size:26px; font-weight:700; color:var(--accent); margin:10px 0;}
  .detail-info .desc{color:var(--ink-soft); max-width:640px; margin-bottom:16px;}
  .qty-row{display:flex; align-items:center; gap:14px; margin:16px 0;}
  .qty-control{display:flex; align-items:center; border:1px solid var(--line); border-radius:4px; overflow:hidden;}
  .qty-control button{border:none; background:var(--paper); width:34px; height:34px; font-size:16px;}
  .qty-control span{width:40px; text-align:center; font-family:'IBM Plex Mono', monospace;}

  /* reviews */
  .reviews-section{margin-top:36px; border-top:1px solid var(--line); padding-top:24px;}
  .review-item{
    background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px;
  }
  .review-item .head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .review-item .who{font-weight:600; font-family:'Fraunces', serif;}
  .review-item .stars{color:var(--gold); font-family:'IBM Plex Mono', monospace; font-size:13px;}
  .review-item .date{font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--ink-soft);}
  .review-form{
    background:var(--bg); border:1px dashed var(--line); border-radius:var(--radius); padding:16px; margin-bottom:18px;
  }
  .review-form textarea{
    width:100%; border:1px solid var(--line); border-radius:4px; padding:10px; font-family:'Source Serif 4', serif;
    font-size:14px; resize:vertical; min-height:70px; margin-top:8px;
  }
  .star-input{font-size:22px; cursor:pointer; color:var(--line);}
  .star-input.filled{color:var(--gold);}
  .link-action{color:var(--accent); text-decoration:underline; cursor:pointer;}
  .link-action.danger-link{color:var(--danger);}

  /* ===== CART / CHECKOUT ===== */
  .cart-item{
    display:grid; grid-template-columns:70px 1fr auto auto auto; gap:14px; align-items:center;
    padding:14px 0; border-bottom:1px solid var(--line);
  }
  .cart-thumb{
    width:60px; height:70px; border-radius:4px; overflow:hidden; display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Fraunces',serif; font-weight:700; font-size:10px; text-align:center; padding:0; background:var(--line-soft);
  }
  .cart-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .cart-totals{
    margin-top:20px; padding-top:16px; border-top:2px solid var(--ink); display:flex; flex-direction:column; gap:8px;
    max-width:340px; margin-left:auto;
  }
  .cart-totals .row{display:flex; justify-content:space-between; font-family:'IBM Plex Mono', monospace; font-size:14px;}
  .cart-totals .row.total{font-size:20px; font-weight:700; color:var(--accent);}
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; font-size:13px;
  }
  .empty-state h3{font-family:'Fraunces',serif; font-style:italic; margin-bottom:10px;}

  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; max-width:560px;}
  .form-grid .full{grid-column:1/-1;}
  .field label{display:block; font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px; border:1px solid var(--line); border-radius:4px; font-family:'Source Serif 4',serif; font-size:14px; background:var(--paper);
  }
  .payment-options{display:flex; flex-direction:column; gap:10px; margin-top:6px;}
  .payment-option{
    display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:4px; padding:12px;
    cursor:pointer; background:var(--paper);
  }
  .payment-option.selected{border-color:var(--accent); background:#fdf3ef;}
  .payment-option .pname{font-weight:600;}
  .payment-option .pdesc{font-size:12px; color:var(--ink-soft);}

  /* ===== AUTH ===== */
  .auth-box{
    max-width:400px; margin:30px auto; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius);
    padding:30px; box-shadow:var(--shadow);
  }
  .auth-box h2{font-style:italic; margin-bottom:6px;}
  .auth-box .sub{color:var(--ink-soft); font-size:13px; margin-bottom:20px;}
  .auth-tabs{display:flex; gap:8px; margin-bottom:20px;}
  .auth-tabs button{flex:1; padding:9px; border:1px solid var(--line); background:var(--bg); border-radius:4px; font-family:'IBM Plex Mono',monospace; font-size:12px;}
  .auth-tabs button.active{background:var(--primary); color:var(--paper); border-color:var(--primary);}
  .field-stack{display:flex; flex-direction:column; gap:12px; margin-bottom:16px;}
  .hint-box{
    margin-top:16px; padding:10px 12px; background:var(--bg); border:1px dashed var(--line); border-radius:4px;
    font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-soft); line-height:1.7;
  }

  /* ===== ADMIN ===== */
  .admin-tabs{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap;}
  .admin-tabs button{
    padding:9px 16px; border:1px solid var(--line); background:var(--paper); border-radius:4px;
    font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:1px;
  }
  .admin-tabs button.active{background:var(--primary); color:var(--paper); border-color:var(--primary);}
  table{width:100%; border-collapse:collapse; background:var(--paper); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  th,td{padding:10px 12px; text-align:left; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle;}
  th{font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); background:var(--bg);}
  tr:last-child td{border-bottom:none;}
  .table-wrap{overflow-x:auto;}
  .small-input{width:70px; padding:5px 7px; border:1px solid var(--line); border-radius:4px; font-family:'IBM Plex Mono', monospace; font-size:12px;}
  .icon-btn{
    border:1px solid var(--line); background:var(--paper); border-radius:4px; padding:5px 9px; font-size:12px; margin-right:4px;
    font-family:'IBM Plex Mono', monospace;
  }
  .icon-btn.edit:hover{border-color:var(--primary); color:var(--primary);}
  .icon-btn.del:hover{border-color:var(--danger); color:var(--danger);}
  .status-pill{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:1px; padding:3px 9px; border-radius:10px;
    text-transform:uppercase; border:1px solid;
  }
  .status-pill.menunggu{color:var(--gold); border-color:var(--gold);}
  .status-pill.diproses{color:#3E6B4F; border-color:#3E6B4F;}
  .status-pill.dikirim{color:#3E5F8A; border-color:#3E5F8A;}
  .status-pill.selesai{color:var(--ink-soft); border-color:var(--ink-soft); background:var(--line-soft);}
  .section-title{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;}

  /* ===== MODAL ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(42,33,24,0.45); display:flex; align-items:center; justify-content:center;
    z-index:1000; padding:20px;
  }
  .modal-box{
    background:var(--paper); border-radius:var(--radius); padding:26px; max-width:520px; width:100%; max-height:90vh;
    overflow-y:auto; box-shadow:0 20px 50px rgba(0,0,0,0.25);
  }
  .modal-box h3{margin-bottom:16px; font-style:italic;}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}

  /* ===== TOAST ===== */
  #toast{
    position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:2000;
  }
  .toast-item{
    background:var(--primary); color:var(--paper); padding:12px 18px; border-radius:4px; font-family:'IBM Plex Mono', monospace;
    font-size:12px; box-shadow:var(--shadow); animation:slidein .2s ease-out; border-left:4px solid var(--accent);
  }
  @keyframes slidein{from{transform:translateX(40px); opacity:0;} to{transform:translateX(0); opacity:1;}}

  /* ===== FOOTER ===== */
  footer{
    background:var(--primary); color:var(--accent-soft); text-align:center; padding:20px;
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1px;
  }

  /* responsive */
  @media (max-width:760px){
    .hero{grid-template-columns:1fr;}
    .detail-wrap{grid-template-columns:1fr;}
    .form-grid{grid-template-columns:1fr;}
    .cart-item{grid-template-columns:50px 1fr; grid-template-areas:"thumb info" "thumb qty" "thumb price" "thumb remove"; row-gap:6px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
/* =========================================================
   PUSTAKA — Toko Buku Daring
   Single-file demo e-commerce: katalog, keranjang, checkout,
   ulasan, akun pengguna, dan panel admin (CRUD buku, stok,
   pesanan, pengguna, moderasi ulasan).
   Data disimpan lewat penyimpanan persisten (window.storage) jika
   tersedia, atau localStorage saat dibuka langsung sebagai file HTML.
   ========================================================= */

const SPINE_COLORS = ["#2F4A3C","#C0563B","#3E5F8A","#7A4E66","#8A7E33","#5C4F40","#3E6B4F","#A2603B"];

const DEFAULT_BOOKS = [
  {id:"b1", title:"Laskar Pelangi", author:"Andrea Hirata", category:"Fiksi", price:85000, stock:15,
    desc:"Kisah persahabatan sepuluh anak Belitung yang berjuang meraih pendidikan di tengah kesederhanaan."},
  {id:"b2", title:"Bumi Manusia", author:"Pramoedya Ananta Toer", category:"Fiksi Klasik", price:95000, stock:8,
    desc:"Novel klasik tetralogi Buru tentang Minke, pemuda pribumi di masa kolonial Hindia Belanda."},
  {id:"b3", title:"Filosofi Teras", author:"Henry Manampiring", category:"Pengembangan Diri", price:89000, stock:20,
    desc:"Pengantar filsafat Stoa untuk mengelola emosi dan menghadapi tantangan hidup modern."},
  {id:"b4", title:"Atomic Habits", author:"James Clear (terj.)", category:"Pengembangan Diri", price:99000, stock:5,
    desc:"Panduan praktis membangun kebiasaan baik dan menghilangkan kebiasaan buruk secara bertahap."},
  {id:"b5", title:"Negeri 5 Menara", author:"Ahmad Fuadi", category:"Fiksi", price:78000, stock:12,
    desc:"Perjalanan Alif menempuh pendidikan di pondok pesantren dan mengejar mimpi hingga ke luar negeri."},

/* ---------------- STORAGE HELPERS ---------------- */
/* Saat dijalankan di Claude.ai, window.storage tersedia untuk penyimpanan
   persisten lintas sesi. Saat file ini dibuka langsung dari komputer
   (file:///...), window.storage tidak ada, jadi kita pakai fallback
   localStorage / memori agar aplikasi tetap berjalan tanpa error. */
const memoryStore = {personal:{}, shared:{}};
const storageAPI = (typeof window !== "undefined" && window.storage) ? window.storage : {
  async get(key, shared=false){
    const scope = shared ? memoryStore.shared : memoryStore.personal;
    if(Object.prototype.hasOwnProperty.call(scope, key)){
      return {key, value: scope[key], shared};
    }
    try{
      const raw = localStorage.getItem((shared?"shared:":"personal:")+key);
      if(raw !== null){ scope[key] = raw; return {key, value: raw, shared}; }
    }catch(e){ /* localStorage unavailable (e.g. some file:// contexts) */ }
    throw new Error("Key not found: "+key);
  },
  async set(key, value, shared=false){
    const scope = shared ? memoryStore.shared : memoryStore.personal;
    scope[key] = value;
    try{ localStorage.setItem((shared?"shared:":"personal:")+key, value); }catch(e){ /* ignore */ }
    return {key, value, shared};
  },
  async delete(key, shared=false){
    const scope = shared ? memoryStore.shared : memoryStore.personal;
    delete scope[key];
    try{ localStorage.removeItem((shared?"shared:":"personal:")+key); }catch(e){ /* ignore */ }
    return {key, deleted:true, shared};
  },
  async list(prefix="", shared=false){
    const scope = shared ? memoryStore.shared : memoryStore.personal;
    const keys = Object.keys(scope).filter(k=>k.startsWith(prefix));
    return {keys, prefix, shared};
  }
};

async function loadAll(){
  try{
    const b = await storageAPI.get("catalog:books", true);
    STATE.books = b ? JSON.parse(b.value) : DEFAULT_BOOKS;
  }catch(e){ STATE.books = DEFAULT_BOOKS; await save("catalog:books", STATE.books); }

  try{
    const r = await storageAPI.get("catalog:reviews", true);
    STATE.reviews = r ? JSON.parse(r.value) : DEFAULT_REVIEWS;
  }catch(e){ STATE.reviews = DEFAULT_REVIEWS; await save("catalog:reviews", STATE.reviews); }

  try{
    const o = await storageAPI.get("catalog:orders", true);
    STATE.orders = o ? JSON.parse(o.value) : [];
  }catch(e){ STATE.orders = []; }

  try{
    const u = await storageAPI.get("catalog:users", true);
    STATE.users = u ? JSON.parse(u.value) : DEFAULT_USERS;
  }catch(e){ STATE.users = DEFAULT_USERS; await save("catalog:users", STATE.users); }

  try{
    const c = await storageAPI.get("catalog:cart", false);
    STATE.cart = c ? JSON.parse(c.value) : [];
  }catch(e){ STATE.cart = []; }

  try{
    const cu = await storageAPI.get("catalog:session", false);
    STATE.currentUser = cu ? JSON.parse(cu.value) : null;
  }catch(e){ STATE.currentUser = null; }
}

async function save(key, value, shared=true){
  try{ await storageAPI.set(key, JSON.stringify(value), shared); }
  catch(e){ console.error("Storage error:", key, e); }
}

/* ---------------- UTIL ---------------- */
function fmtRupiah(n){ return "Rp" + Number(n).toLocaleString("id-ID"); }
function spineColor(id){
  let h=0; for(const c of id) h += c.charCodeAt(0);
  return SPINE_COLORS[h % SPINE_COLORS.length];
}
function coverUrl(book, w=400, h=600){
  if(book.cover && book.cover.trim()) return book.cover.trim();
  const bg = spineColor(book.id).replace("#","");
  return `https://placehold.co/${w}x${h}/${bg}/FFFFFF?font=playfair-display&text=${encodeURIComponent(book.title)}`;
}
function avgRating(bookId){
  const list = STATE.reviews[bookId] || [];
  if(list.length===0) return null;
  return list.reduce((a,r)=>a+r.rating,0)/list.length;
}
function starsHtml(rating, size="13px"){
  rating = rating || 0;
  let html = "";
  for(let i=1;i<=5;i++){ html += i<=Math.round(rating) ? "★" : "☆"; }
  return `<span style="font-size:${size}">${html}</span>`;
}
function toast(msg){
  const el = document.createElement("div");
  el.className = "toast-item";
  el.textContent = msg;
  document.getElementById("toast").appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function isAdmin(){ return STATE.currentUser && STATE.currentUser.role==="admin"; }
function escapeHtml(s){

/* ---------------- CART ACTIONS ---------------- */
function addToCart(bookId, qty=1){
  const book = findBook(bookId);
  if(!book) return;
  const existing = STATE.cart.find(c=>c.bookId===bookId);
  const currentQty = existing ? existing.qty : 0;
  if(currentQty + qty > book.stock){
    toast(`Stok "${book.title}" tidak cukup.`);
    return;
  }
  if(existing) existing.qty += qty;
  else STATE.cart.push({bookId, qty});
  saveCart();
  toast(`"${book.title}" ditambahkan ke keranjang.`);
  render();
}
function updateCartQty(bookId, delta){
  const item = STATE.cart.find(c=>c.bookId===bookId);
  if(!item) return;
  const book = findBook(bookId);
  item.qty += delta;
  if(item.qty < 1) item.qty = 1;
  if(item.qty > book.stock) item.qty = book.stock;
  saveCart();
  render();
}
function removeFromCart(bookId){
  STATE.cart = STATE.cart.filter(c=>c.bookId!==bookId);
  saveCart();
  render();
}
function cartTotal(){
  return STATE.cart.reduce((sum,c)=>{
    const b = findBook(c.bookId);
    return sum + (b ? b.price*c.qty : 0);
  },0);
}
function cartCount(){
  return STATE.cart.reduce((s,c)=>s+c.qty,0);
}

/* ---------------- ORDER / CHECKOUT ---------------- */
function placeOrder(){
  if(!STATE.currentUser){ toast("Silakan masuk untuk checkout."); setView("auth"); return; }
  if(STATE.cart.length===0){ toast("Keranjang masih kosong."); return; }
  const {nama, alamat, telepon} = STATE.shippingForm;
  if(!nama || !alamat || !telepon){ toast("Lengkapi data pengiriman."); return; }

  // validate & reduce stock
  for(const item of STATE.cart){
    const book = findBook(item.bookId);
    if(!book || book.stock < item.qty){ toast(`Stok "${book?book.title:'buku'}" tidak cukup.`); return; }
  }
  const items = STATE.cart.map(c=>{
    const book = findBook(c.bookId);
    book.stock -= c.qty;
    return {bookId:c.bookId, title:book.title, price:book.price, qty:c.qty};
  });
  const order = {
    id: "ORD-" + Date.now().toString(36).toUpperCase(),
    username: STATE.currentUser.username,
    items,
    total: items.reduce((s,i)=>s+i.price*i.qty,0),
    payment: STATE.selectedPayment,
    shipping: {...STATE.shippingForm},
    status: STATE.selectedPayment==="cod" ? "Diproses" : "Menunggu Pembayaran",
    date: new Date().toISOString(),
  };
  STATE.orders.unshift(order);
  STATE.cart = [];
  saveOrders(); saveBooks(); saveCart();
  toast(`Pesanan ${order.id} berhasil dibuat!`);
  setView("order_success", {lastOrderId: order.id});
}

    date: new Date().toISOString().slice(0,10)

  STATE.myRating = 0;

  render();
}

function filteredBooks(){
  let list = STATE.books.slice();
  const {search, category, sort} = STATE.filters;
  if(category && category !== "Semua") list = list.filter(b=>b.category===category);
  if(search){
    const s = search.toLowerCase();
    list = list.filter(b=>b.title.toLowerCase().includes(s) || b.author.toLowerCase().includes(s));
  }
  if(sort==="price_asc") list.sort((a,b)=>a.price-b.price);
  if(sort==="price_desc") list.sort((a,b)=>b.price-a.price);
  if(sort==="rating") list.sort((a,b)=>(avgRating(b.id)||0)-(avgRating(a.id)||0));
  return list;
}

      <button class="icon-btn del" data-action="cart-remove" data-id="${b.id}">Hapus</button>

  }).join("");

  return `

    <div class="row"><span>Subtotal (${cartCount()} item)</span><span>${fmtRupiah(cartTotal())}</span></div>
    <div class="row total"><span>Total</span><span>${fmtRupiah(cartTotal())}</span></div>

}

function renderOrderSuccess(){

    <p>Status: <span class="status-pill ${statusClass(order?order.status:'')}">${order?order.status:''}</span></p>

function statusClass(status){
  const m = {"Menunggu Pembayaran":"menunggu","Diproses":"diproses","Dikirim":"dikirim","Selesai":"selesai"};
  return m[status] || "menunggu";
}

    <div style="margin-top:16px;"><button class="btn" data-action="go-catalog">Mulai Belanja</button></div></div>`;
  }
  return `

  ${myOrders.map(o=>`
    <div class="review-item" style="margin-bottom:14px;">

        <span class="status-pill ${statusClass(o.status)}">${o.status}</span>

/* ---------------- ADMIN ---------------- */
function renderAdmin(){

    return `<div class="empty-state"><h3>Akses Ditolak</h3><p>Halaman ini hanya untuk admin.</p>

function renderAdminOrders(){

        <td style="font-size:12px;">${o.items.map(i=>`${i.qty}× ${escapeHtml(i.title)}`).join("<br>")}</td>

        <td style="font-size:12px;">${PAYMENT_METHODS.find(p=>p.id===o.payment)?.name||o.payment}</td>
        <td>

function renderAdminUsers(){
  return `
  <h3 style="font-size:18px; margin-bottom:14px;">Pengguna Terdaftar (${STATE.users.length})</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>Username</th><th>Email</th><th>Peran</th><th>Aksi</th></tr></thead>
    <tbody>
    ${STATE.users.map(u=>`
      <tr>
        <td>${escapeHtml(u.username)}</td>
        <td>${escapeHtml(u.email||'-')}</td>
        <td><span class="status-pill ${u.role==='admin'?'diproses':'selesai'}">${u.role}</span></td>
        <td>
          ${u.username!=='admin' ? `
          <button class="icon-btn edit" data-action="admin-toggle-role" data-username="${escapeHtml(u.username)}">${u.role==='admin'?'Jadikan User':'Jadikan Admin'}</button>
          <button class="icon-btn del" data-action="admin-del-user" data-username="${escapeHtml(u.username)}">Hapus</button>` : `<span style="color:var(--ink-soft); font-size:12px;">akun utama</span>`}

      </tr>`).join("")}
    </tbody>
  </table>
  </div>`;

function renderAdminReviews(){
  const entries = [];
  for(const bookId in STATE.reviews){
    const book = findBook(bookId);
    (STATE.reviews[bookId]||[]).forEach((r,idx)=>entries.push({bookId, book, r, idx}));
  }
  if(entries.length===0) return `<div class="empty-state"><h3>Belum ada ulasan</h3></div>`;
  return `
  <h3 style="font-size:18px; margin-bottom:14px;">Semua Ulasan (${entries.length})</h3>
  <div class="table-wrap">
  <table>
    <thead><tr><th>Buku</th><th>Pengguna</th><th>Rating</th><th>Komentar</th><th>Tanggal</th><th>Aksi</th></tr></thead>
    <tbody>
    ${entries.map(e=>`
      <tr>
        <td>${e.book?escapeHtml(e.book.title):'(dihapus)'}</td>
        <td>${escapeHtml(e.r.user)}</td>
        <td>${starsHtml(e.r.rating)}</td>
        <td style="max-width:280px;">${escapeHtml(e.r.comment)}</td>
        <td style="font-size:12px;">${e.r.date}</td>
        <td><button class="icon-btn del" data-action="del-review" data-id="${e.bookId}" data-idx="${e.idx}">Hapus</button></td>

}

/* ---------------- MODAL (Add/Edit Book) ---------------- */
let MODAL = null; // {mode:'add'|'edit', book:{...}}

function renderModal(){
  if(!MODAL) return "";
  const b = MODAL.book;
  return `
  <div class="modal-overlay" data-action="close-modal">
    <div class="modal-box">
      <h3>${MODAL.mode==='add'?'Tambah Buku Baru':'Edit Buku'}</h3>
      <div class="field-stack">
        <div class="field"><label>Judul</label><input id="mTitle" value="${escapeHtml(b.title)}"></div>
        <div class="field"><label>Penulis</label><input id="mAuthor" value="${escapeHtml(b.author)}"></div>
        <div class="field"><label>Kategori</label><input id="mCategory" value="${escapeHtml(b.category)}"></div>
        <div class="field"><label>Harga (Rp)</label><input id="mPrice" type="number" min="0" value="${b.price}"></div>
        <div class="field"><label>Stok</label><input id="mStock" type="number" min="0" value="${b.stock}"></div>
        <div class="field"><label>URL Gambar Sampul (opsional)</label><input id="mCover" value="${escapeHtml(b.cover||'')}" placeholder="https://contoh.com/sampul.jpg"></div>
        <div class="field"><label>Deskripsi</label><textarea id="mDesc">${escapeHtml(b.desc)}</textarea></div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" data-action="close-modal">Batal</button>
        <button class="btn" data-action="save-book">Simpan</button>
      </div>
    </div>
  </div>`;
}

/* ================= EVENTS ================= */
function attachEvents(){
  const app = document.getElementById("app");

  // search
  const searchInput = document.getElementById("searchInput");
  if(searchInput){
    searchInput.addEventListener("input", e=>{
      STATE.filters.search = e.target.value;
      const grid = document.querySelector(".grid") || document.querySelector(".empty-state");
      // light re-render of grid + filters only to keep focus in input
      const main = document.querySelector("main");
      if(main && STATE.view==="catalog"){
        main.innerHTML = renderHero() + renderFilters() + renderGrid();
        attachEvents();
        document.getElementById("searchInput").focus();
        document.getElementById("searchInput").value = STATE.filters.search;
        const len = STATE.filters.search.length;
        document.getElementById("searchInput").setSelectionRange(len,len);
      }
    });
  }
  const sortSelect = document.getElementById("sortSelect");
  if(sortSelect){
    sortSelect.addEventListener("change", e=>{
      STATE.filters.sort = e.target.value;
      render();
    });
  }

  // generic click delegation
 document.addEventListener("click", onClick);
}

function onClick(e){
  const t = e.target.closest("[data-action]");
  if(!t) return;
  if(t.tagName === "A") e.preventDefault();

      switch (t.dataset.action) {
        case "close-modal":
            closeModal();
            break;

        case "save-book":
            saveModalBook();
            break;
    }

  const action = t.dataset.action;

  switch(action){
    case "go-catalog": setView("catalog"); break;
    case "go-cart": setView("cart"); break;
    case "go-checkout":
      if(!STATE.currentUser){ toast("Silakan masuk untuk checkout."); setView("auth"); return; }
      setView("checkout"); break;
    case "go-orders": setView("orders"); break;
    case "go-auth": setView("auth", {authMode:"login"}); break;
    case "go-admin": setView("admin"); break;
    case "logout": doLogout(); break;

    case "view-book": setView("detail", {selectedBookId:t.dataset.id, qty:1, myRating:0}); break;
    case "quick-add": addToCart(t.dataset.id, 1); break;
    case "add-to-cart-detail": addToCart(t.dataset.id, STATE.qty); break;
    case "qty-inc": STATE.qty++; render(); break;
    case "qty-dec": if(STATE.qty>1) STATE.qty--; render(); break;

    case "cart-inc": updateCartQty(t.dataset.id, 1); break;
    case "cart-dec": updateCartQty(t.dataset.id, -1); break;
    case "cart-remove": removeFromCart(t.dataset.id); break;

    case "filter-cat": STATE.filters.category = t.dataset.cat; render(); break;

    case "select-payment": STATE.selectedPayment = t.dataset.id; render(); break;
    case "place-order":
      readShippingForm();
      placeOrder();
      break;

    case "set-star": STATE.myRating = parseInt(t.dataset.val); render(); break;
    case "submit-review": {
      const comment = document.getElementById("reviewComment")?.value || "";
      submitReview(t.dataset.id, STATE.myRating, comment);
      break;
    }
    case "del-review": deleteReview(t.dataset.id, parseInt(t.dataset.idx)); break;

    case "auth-mode": STATE.authMode = t.dataset.mode; render(); break;
    case "submit-login": {
      const u = document.getElementById("authUsername").value.trim();
      const p = document.getElementById("authPassword").value;
      doLogin(u,p);
      break;
    }
    case "submit-register": {
      const u = document.getElementById("authUsername").value.trim();
      const p = document.getElementById("authPassword").value;
      const em = document.getElementById("authEmail")?.value.trim();
      doRegister(u,p,em);
      break;
    }

    /* ADMIN */
    case "admin-tab": STATE.adminTab = t.dataset.tab; render(); break;
    case "admin-update-stock": break; // handled on change event below
    case "admin-add-book":
      MODAL = {mode:"add", book:{id:"b"+Date.now(), title:"", author:"", category:"", price:0, stock:0, desc:"", cover:""}};
      render(); break;
    case "admin-edit-book":
      MODAL = {mode:"edit", book:JSON.parse(JSON.stringify(findBook(t.dataset.id)))};
      render(); break;
    case "admin-del-book":
      if(confirm("Hapus buku ini? Tindakan tidak dapat dibatalkan.")){
        STATE.books = STATE.books.filter(b=>b.id!==t.dataset.id);
        delete STATE.reviews[t.dataset.id];
        saveBooks(); saveReviews();
        render();
      }
      break;
    case "save-book": saveModalBook(); break;
    case "close-modal":
      if(t.classList.contains("modal-overlay") || t.dataset.action==="close-modal"){ MODAL=null; render(); }
      break;

    case "admin-toggle-role": {
      const u = STATE.users.find(u=>u.username===t.dataset.username);
      if(u){ u.role = u.role==="admin"?"user":"admin"; saveUsers(); render(); }
      break;
    }
    case "admin-del-user":
      if(confirm("Hapus pengguna ini?")){
        STATE.users = STATE.users.filter(u=>u.username!==t.dataset.username);
        saveUsers(); render();
      }
      break;
  }
}

function readShippingForm(){
  STATE.shippingForm.nama = document.getElementById("shipNama")?.value || STATE.shippingForm.nama;
  STATE.shippingForm.alamat = document.getElementById("shipAlamat")?.value || STATE.shippingForm.alamat;
  STATE.shippingForm.telepon = document.getElementById("shipTelepon")?.value || STATE.shippingForm.telepon;
}

function saveModalBook(){
  const b = MODAL.book;
  b.title = document.getElementById("mTitle").value.trim();
  b.author = document.getElementById("mAuthor").value.trim();
  b.category = document.getElementById("mCategory").value.trim() || "Umum";
  b.price = parseInt(document.getElementById("mPrice").value) || 0;
  b.stock = parseInt(document.getElementById("mStock").value) || 0;
  b.cover = document.getElementById("mCover").value.trim();
  b.desc = document.getElementById("mDesc").value.trim();

  if(!b.title || !b.author){ toast("Judul dan penulis wajib diisi."); return; }

  if(MODAL.mode==="add"){
    STATE.books.push(b);
    toast("Buku baru ditambahkan.");
  }else{
    const idx = STATE.books.findIndex(x=>x.id===b.id);
    STATE.books[idx] = b;
    toast("Buku berhasil diperbarui.");
  }
  saveBooks();
  MODAL = null;
  render();
}

/* stock input change (separate listener, since input event needed) */
document.addEventListener("change", e=>{
  if(e.target.dataset && e.target.dataset.action==="admin-update-stock"){
    const book = findBook(e.target.dataset.id);
    if(book){
      let val = parseInt(e.target.value);
      if(isNaN(val) || val<0) val = 0;
      book.stock = val;
      saveBooks();
      render();
    }
  }
  if(e.target.dataset && e.target.dataset.action==="admin-order-status"){
    const order = STATE.orders.find(o=>o.id===e.target.dataset.id);
    if(order){
      order.status = e.target.value;
      saveOrders();
      render();
    }
  }
});

/* ================= INIT ================= */
(async function init(){
  await loadAll();
  render();
})();
</script>
